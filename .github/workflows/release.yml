name: Release

# Backup path — `just release X.Y.Z` builds and attaches binaries locally
# (zero Actions minutes). Trigger this manually only if that step was skipped
# (e.g. goreleaser not installed). The Homebrew tap is updated by `just release`.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
