# GoReleaser builds prebuilt binaries and attaches them to the GitHub release.
# The Homebrew tap is handled separately (build-from-source) by `just release`.
version: 2

project_name: git-recap

before:
  hooks:
    - go mod tidy

builds:
  - env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Tag }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  # `just release` creates the release first; GoReleaser just adds binaries to it.
  mode: keep-existing
